<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Agenda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #000, #300, #900);
            color: white;
        }

        .card {
            background: #111;
            padding: 30px;
            border-radius: 15px;
            width: 380px;
            box-shadow: 0 0 20px rgba(255, 0, 0, .5);
        }

        h1,
        h2 {
            text-align: center;
            color: #ff2b2b;
            margin-bottom: 15px;
        }

        input,
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
        }

        input {
            border: 1px solid #ff2b2b;
            background: #222;
            color: white;
        }

        button {
            background: #c00000;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #ff0000;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #c00000;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #c00000;
            color: white;
        }
    </style>
</head>

<body style="display:block;padding:20px;background:#000;color:white;">
    <h1>Olá, <span id="nomeUser"></span></h1>
    <button onclick="sair()">Sair</button>
    <form onsubmit="adicionarNota(event)">
        <input id="titulo" placeholder="Compromisso" required>
        <input type="date" id="data" required>
        <input id="desc" placeholder="Descrição" required>
        <button>Adicionar</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Título</th>
                <th>Data</th>
                <th>Descrição</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="notes-list"></tbody>
    </table>
    <script>
        let id = localStorage.getItem("id");
        if (!id) location.href = "login.html";
        nomeUser.innerText = localStorage.getItem("nome");

        function sair() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        async function carregarDados() {
            let notes = await (await fetch(`http://localhost:3000/notes?idUser=${id}`)).json();
            notesList = document.getElementById("notes-list");
            notesList.innerHTML = "";
            notes.forEach(n => notesList.innerHTML += `<tr><td>${n.titulo}</td><td>${n.data}</td><td>${n.desc}</td><td><button onclick="deletarNota(${n.id})">Excluir</button></td></tr>`);
        }

        async function adicionarNota(e) {
            e.preventDefault();
            await fetch("http://localhost:3000/notes", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ titulo: titulo.value, data: data.value, desc: desc.value, idUser: id }) });
            carregarDados();
        }

        async function deletarNota(i) {
            await fetch(`http://localhost:3000/notes/${i}`, { method: "DELETE" });
            carregarDados();
        }
        carregarDados();
    </script>
</body>

</html>
